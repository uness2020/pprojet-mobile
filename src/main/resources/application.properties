# Spring Boot Configuration for Secure Storage Inspector

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=secure-storage-inspector

# Logging Configuration
logging.level.root=INFO
logging.level.com.mobapp.inspector=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/app.log

# Database Configuration (SQLite)
spring.datasource.url=jdbc:sqlite:secure_storage_inspector.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# API Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
